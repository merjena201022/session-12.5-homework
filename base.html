<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookTrack | Minimalist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCFCFA; --card: #FFFFFF; --text: #1A1A1A; --accent: #FFDE59; --border: #EEEEEE;
        }
        body.dark-mode {
            --bg: #121212; --card: #1E1E1E; --text: #F0F0F0; --accent: #BB86FC; --border: #333333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .navbar { background: var(--card) !important; border-bottom: 3px solid var(--accent); }
        .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; transition: 0.3s; }
        .btn-yellow { background: var(--accent); color: #000; font-weight: bold; border-radius: 10px; border: none; padding: 10px 20px; }
        .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-800" href="/">📚 BookTrack</a>
            <div>
                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary me-2">🌓 Mode</button>
                <a href="/add" class="btn btn-yellow">+ Add Book</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        const btn = document.getElementById('theme-toggle');
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        btn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };

        async function deleteBook(id) {
            if(!confirm("Delete this book?")) return;
            const res = await fetch(`/delete/${id}`, { method: 'DELETE' });
            if(res.ok) document.getElementById(`book-${id}`).remove();
        }
    </script>
</body>
</html>
