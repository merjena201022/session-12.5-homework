{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="book-card p-4">
            <h4 class="fw-bold mb-4">New Book</h4>
            <form action="/add" method="POST">
                <input type="text" name="title" class="form-control mb-3" placeholder="Title" required>
                <input type="text" name="author" class="form-control mb-3" placeholder="Author" required>
                <select name="status" class="form-select mb-3">
                    <option value="want_to_read">Want to Read</option>
                    <option value="reading">Reading</option>
                    <option value="finished">Finished</option>
                </select>
                <button type="submit" class="btn btn-yellow w-100">Save Book</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
