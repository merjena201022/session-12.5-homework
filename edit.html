<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Edit Task - {{ item.subject }}</title>
</head>
<body>
    <div class="container">
        <h1>Edit Study Task</h1>
        <form method="POST">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" value="{{ item.subject }}" required>

            <label for="plan">Task Plan</label>
            <input type="text" id="plan" name="plan" value="{{ item.plan }}" required>

            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option value="High" {% if item.priority == 'High' %}selected{% endif %}>High Priority</option>
                <option value="Medium" {% if item.priority == 'Medium' %}selected{% endif %}>Medium Priority</option>
                <option value="Low" {% if item.priority == 'Low' %}selected{% endif %}>Low Priority</option>
            </select>

            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline" value="{{ item.deadline }}" required>

            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4">{{ item.notes }}</textarea>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-add">Update Task</button>
                <a href="{{ url_for('index') }}" style="margin-left: 15px; color: #666;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
