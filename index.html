{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
    <div class="col-6"><h3>My Library ({{ stats.total }})</h3></div>
    <div class="col-6 text-end text-muted small">Finished: {{ stats.finished }}</div>
</div>
<div class="row">
    {% for book in books %}
    <div class="col-md-4 mb-4" id="book-{{ book.id }}">
        <div class="book-card p-4">
            <span class="status-badge mb-2 d-inline-block">{{ book.status }}</span>
            <h5 class="fw-bold">{{ book.title }}</h5>
            <p class="text-muted small">by {{ book.author }}</p>
            <div class="mt-3 border-top pt-2 d-flex justify-content-between">
                <a href="/edit/{{ book.id }}" class="btn btn-sm text-primary p-0">Edit</a>
                <button onclick="deleteBook('{{ book.id }}')" class="btn btn-sm text-danger p-0">Delete</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
